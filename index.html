const edges = new vis.DataSet(DATA.edges.map((e,i)=>({id:i,...e,color:{color:'#30363d',highlight:'#58a6ff'}})));
document.getElementById('stat').textContent = DATA.nodes.length + ' 節點 · ' + DATA.edges.length + ' 連結';
const net = new vis.Network(document.getElementById('net'), {nodes,edges}, {

});
const s = document.getElementById('search');
function focus(){
  const q = s.value.trim().toLowerCase();
  if(!q) return;
  const hit = DATA.nodes.find(n => (n.label||'').toLowerCase().includes(q) || n.id.toLowerCase().includes(q));
  if(hit){ net.focus(hit.id,{scale:1.3,animation:true}); net.selectNodes([hit.id]); }
}
s.addEventListener('keydown',e=>{if(e.key==='Enter')focus();});
