<style>
  :root{--ink:#e8eefc;--muted:#9fb0d4;--line:rgba(120,150,220,.18)}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;color:var(--ink);
    font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif}
  /* 深空 + 星雲背景 */
  #space{position:fixed;inset:0;z-index:0;background:
    radial-gradient(1200px 820px at 17% 20%, rgba(58,86,190,.20), transparent 60%),
    radial-gradient(1000px 760px at 84% 78%, rgba(150,72,184,.16), transparent 62%),
    radial-gradient(760px 760px at 66% 14%, rgba(38,150,168,.13), transparent 60%),
    radial-gradient(900px 900px at 38% 96%, rgba(40,60,150,.12), transparent 60%),
    #05070f}
  #stars{position:fixed;inset:0;z-index:1;pointer-events:none}
  #net{position:fixed;inset:0;z-index:2}
  /* 玻璃工具列 */
  #bar{position:fixed;top:0;left:0;right:0;z-index:10;padding:11px 18px;
    background:linear-gradient(180deg,rgba(7,10,22,.82),rgba(7,10,22,.42));
    backdrop-filter:blur(9px);border-bottom:1px solid var(--line);
    display:flex;gap:16px;align-items:center;flex-wrap:wrap}
  #bar h1{font-size:15px;margin:0;font-weight:700;letter-spacing:.04em;
    display:flex;align-items:center;gap:8px}
  #bar h1 b{font-weight:800;background:linear-gradient(90deg,#8fd0ff,#c7b4ff);
    -webkit-background-clip:text;background-clip:text;color:transparent}
  #search{background:rgba(18,24,46,.8);border:1px solid var(--line);color:var(--ink);
    border-radius:8px;padding:7px 12px;width:230px;font-size:13px;outline:none}
  #search:focus{border-color:#6fb1ff;box-shadow:0 0 0 2px rgba(111,177,255,.18)}
  .chip{font-size:12px;display:inline-flex;align-items:center;gap:6px;color:var(--muted)}
  .chip i{width:10px;height:10px;border-radius:50%;display:inline-block;
    box-shadow:0 0 8px 1px currentColor}
  .btn{background:rgba(18,24,46,.8);border:1px solid var(--line);color:var(--ink);
    border-radius:8px;padding:7px 12px;font-size:12.5px;cursor:pointer}
  .btn:hover{border-color:#6fb1ff;color:#bcd9ff}
  #stat{font-size:12px;color:var(--muted);margin-left:auto;display:flex;
    gap:14px;align-items:center}
  #sizenote{font-size:11.5px;color:#7f8db3}
  #hint{position:fixed;left:18px;bottom:14px;z-index:10;font-size:11.5px;
    color:#7385ad}
  @media(max-width:680px){#sizenote,#hint{display:none}#search{width:150px}}
</style>
</head>

<div id="space"></div>

  <span id="stat"></span>
</div>

const sc=document.getElementById('stars'),sx=sc.getContext('2d');
function drawStars(){sc.width=innerWidth;sc.height=innerHeight;
  sx.clearRect(0,0,sc.width,sc.height);
  const N=Math.round(sc.width*sc.height/9000);
  for(let i=0;i<N;i++){const x=Math.random()*sc.width,y=Math.random()*sc.height,
    r=Math.random()*1.3+.2,a=Math.random()*.5+.08;
    sx.fillStyle='rgba(205,222,255,'+a+')';sx.beginPath();sx.arc(x,y,r,0,7);sx.fill();}
}
drawStars();addEventListener('resize',drawStars);

const imp=new Set(DATA.nodes.filter(n=>n._imp).map(n=>n.id));
const nm={};DATA.nodes.forEach(n=>nm[n.id]=n.name);
const nodes=new vis.DataSet(DATA.nodes);
const edges=new vis.DataSet(DATA.edges.map((e,i)=>({id:i,from:e.from,to:e.to,
  color:{color:'rgba(140,170,235,.10)',highlight:'rgba(150,205,255,.95)',hover:'rgba(150,205,255,.55)'}})));
document.getElementById('stat').textContent=DATA.nodes.length+' 星體 · '+DATA.edges.length+' 連結';

const net=new vis.Network(document.getElementById('net'),{nodes,edges},{
  nodes:{shape:'dot',scaling:{min:5,max:40},borderWidth:1.2},
  edges:{smooth:{type:'continuous',roundness:.2},width:.6,hoverWidth:1.3,selectionWidth:1.8},
  physics:{barnesHut:{gravitationalConstant:-55000,centralGravity:.008,springLength:230,
    springConstant:.02,damping:.6,avoidOverlap:.8},
    stabilization:{iterations:380},minVelocity:.7},
  layout:{improvedLayout:DATA.nodes.length<420},
  interaction:{hover:true,tooltipDelay:110,keyboard:true,navigationButtons:false,
    hideEdgesOnDrag:true,hideEdgesOnZoom:true}
});

/* 把佈局「攤平」到整個畫面：取中央 96% 的節點，線性拉伸到全螢幕 */
function quant(arr,p){const a=arr.slice().sort((m,n)=>m-n);
  return a[Math.max(0,Math.min(a.length-1,Math.round(p*(a.length-1))))];}
function spreadToFill(){
  /* 以「排名均勻化」攤平密度（解決中央擠成一團）：x、y 各自按排名重分佈成
     近似均勻，再與線性正規化 35% 混合保留拓樸聚集，加微抖動避免格點感。 */
  const pos=net.getPositions(),ids=Object.keys(pos);
  if(ids.length<2)return;
  const n=ids.length, A=0.66;                 // 排名(均勻)權重；越高越散
  const TW=innerWidth*0.95, TH=(innerHeight-72)*0.9;
  const xs=ids.map(i=>pos[i].x), ys=ids.map(i=>pos[i].y);
  const qx0=quant(xs,.02),qx1=quant(xs,.98),qy0=quant(ys,.02),qy1=quant(ys,.98);
  const lin=(v,a,b)=>Math.max(0,Math.min(1,(v-a)/((b-a)||1)));
  const rx={},ry={};
  ids.slice().sort((p,q)=>pos[p].x-pos[q].x).forEach((id,i)=>rx[id]=i/(n-1));
  ids.slice().sort((p,q)=>pos[p].y-pos[q].y).forEach((id,i)=>ry[id]=i/(n-1));
  nodes.update(ids.map(id=>{
    const fx=A*rx[id]+(1-A)*lin(pos[id].x,qx0,qx1);
    const fy=A*ry[id]+(1-A)*lin(pos[id].y,qy0,qy1);
    return {id,x:(fx-0.5)*TW+(Math.random()*10-5),
                y:(fy-0.5)*TH+(Math.random()*10-5)};
  }));
}
function fillView(){net.moveTo({position:{x:0,y:18},scale:1,
  animation:{duration:700,easingFunction:'easeInOutQuad'}});}
net.once('stabilizationIterationsDone',()=>{net.setOptions({physics:false});
  spreadToFill();fillView();});
let _rt;addEventListener('resize',()=>{clearTimeout(_rt);
  _rt=setTimeout(()=>{spreadToFill();fillView();},220);});

/* hover 才顯示非重要星名（LOD，避免標籤打架） */
net.on('hoverNode',p=>{if(!imp.has(p.node))nodes.update({id:p.node,label:nm[p.node]});});
net.on('blurNode',p=>{if(!imp.has(p.node))nodes.update({id:p.node,label:''});});

/* 點擊：聚焦並淡出非鄰居，凸顯該星的星座 */
let lit=null;
function relight(){if(lit){const ns=net.getConnectedNodes(lit);const keep=new Set([lit,...ns]);
  nodes.forEach(n=>{const on=keep.has(n.id);
    nodes.update({id:n.id,opacity:on?1:.12,label:(imp.has(n.id)||n.id===lit||(ns.includes(n.id)))?nm[n.id]:''});});}}
net.on('click',p=>{
  if(p.nodes.length){lit=p.nodes[0];relight();
    net.focus(lit,{scale:Math.max(net.getScale(),.55),animation:{duration:600}});}
  else if(lit){lit=null;nodes.forEach(n=>nodes.update({id:n.id,opacity:1,
    label:imp.has(n.id)?nm[n.id]:''}));}
});

/* 搜尋聚焦 */
const s=document.getElementById('search');
function go(){const q=s.value.trim().toLowerCase();if(!q)return;
  const hit=DATA.nodes.find(n=>(n.name||'').toLowerCase().includes(q)||n.id.toLowerCase().includes(q));
  if(hit){lit=hit.id;relight();net.selectNodes([hit.id]);
    net.focus(hit.id,{scale:1.15,animation:{duration:700}});}}
s.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
document.getElementById('fit').onclick=()=>{lit=null;
  nodes.forEach(n=>nodes.update({id:n.id,opacity:1,label:imp.has(n.id)?nm[n.id]:''}));
  fillView();};
</script>
