  const COL={topic:'#54E0B6',concept:'#6FB1FF',entity:'#FFC861',source:'#8C9BC4',unknown:'#FF6B6B'};
  const nodes=RAW.nodes.map(function(n){return Object.assign({},n);});
  const links=RAW.links.map(function(l){return {source:l.s,target:l.t};});
  document.getElementById('stat').textContent=nodes.length+' 星體 · '+links.length+' 連結';
  var ds=nodes.map(function(n){return n.d;}).sort(function(a,b){return b-a;});
  var HUB=Math.max(ds[Math.min(16,ds.length-1)]||0,14);
  var adjId={}; nodes.forEach(function(n){adjId[n.id]=new Set();});
  links.forEach(function(l){adjId[l.source].add(l.target);adjId[l.target].add(l.source);});
  var SEL=null, hlN=new Set(), hlL=new Set();   // 選取中的節點、亮起的節點/連結
  function labelObj(n){
    if(typeof SpriteText==='undefined')return null;
    var show = SEL ? hlN.has(n.id) : (n.d>=HUB);   // 選取時：自己＋鄰居都顯示星名
    if(!show)return null;
    var s=new SpriteText(n.t.length<=16?n.t:n.t.slice(0,16)+'…');
    s.color=(n.id===SEL)?'#ffffff':'#eaf3ff';s.textHeight=Math.min(8,3.6+n.d*0.05);
    s.fontWeight='600';s.backgroundColor='rgba(8,12,26,0.62)';s.padding=2;s.borderRadius=3;
    s.position.set(0,7+Math.sqrt(n.d)*1.6,0);return s;}

    .backgroundColor('#05070f')
    .graphData({nodes:nodes,links:links})
    .nodeColor(function(n){var c=COL[n.ty]||COL.unknown;
      if(!SEL)return c; if(n.id===SEL)return '#ffffff'; return hlN.has(n.id)?c:'#1b2336';})
    .nodeVal(function(n){return 1+n.d*1.5;})
    .nodeOpacity(0.96).nodeResolution(14)
    .nodeThreeObjectExtend(true).nodeThreeObject(labelObj)
    .nodeLabel(function(n){return '<div style="font:13px PingFang TC;color:#eaf2ff;background:rgba(8,12,26,.85);padding:3px 7px;border-radius:6px">'+n.t+' · '+n.d+' 連結</div>';})

  Graph.d3Force('cluster',clusterForce(0.09));
  var ctr=Graph.controls(); ctr.autoRotate=true; ctr.autoRotateSpeed=0.6;
  document.getElementById('spin').onclick=function(e){ctr.autoRotate=!ctr.autoRotate;e.target.classList.toggle('on',ctr.autoRotate);};
  var sIn=document.getElementById('search');
  sIn.addEventListener('keydown',function(e){if(e.key!=='Enter')return;var q=sIn.value.trim().toLowerCase();if(!q)return;
    var hit=nodes.find(function(x){return x.t.toLowerCase().includes(q)||x.id.toLowerCase().includes(q);});if(hit)focusNode(hit);});
  addEventListener('resize',function(){Graph.width(innerWidth).height(innerHeight);});
  setTimeout(function(){Graph.zoomToFit(900,80);},1500);
  function refresh(){Graph.nodeColor(Graph.nodeColor()).linkColor(Graph.linkColor())
    .linkWidth(Graph.linkWidth()).linkDirectionalParticles(Graph.linkDirectionalParticles())
    .nodeThreeObject(labelObj);}
  function onClickNode(n){
    if(SEL===n.id){clearSel();return;}
    SEL=n.id; hlN=new Set([n.id]); (adjId[n.id]||new Set()).forEach(function(x){hlN.add(x);});
    hlL=new Set(); Graph.graphData().links.forEach(function(l){
      var s=(l.source.id!==undefined?l.source.id:l.source),
          t=(l.target.id!==undefined?l.target.id:l.target);
      if(s===n.id||t===n.id)hlL.add(l);});
    refresh(); focusNode(n);}
  function clearSel(){SEL=null;hlN=new Set();hlL=new Set();refresh();}
  function focusNode(n){var r=Math.hypot(n.x,n.y,n.z)||1,k=1+80/r;Graph.cameraPosition({x:n.x*k,y:n.y*k,z:n.z*k},n,1200);}
  function clusterForce(strength){var ns;
    function f(alpha){var sum={},cnt={};
      ns.forEach(function(n){var k=n.cl||n.id;(sum[k]=sum[k]||[0,0,0]);cnt[k]=(cnt[k]||0)+1;sum[k][0]+=n.x;sum[k][1]+=n.y;sum[k][2]+=n.z;});
      for(var k in sum){sum[k][0]/=cnt[k];sum[k][1]/=cnt[k];sum[k][2]/=cnt[k];}
      var kk=strength*alpha;
      ns.forEach(function(n){var c=sum[n.cl||n.id];if(!c)return;n.vx+=(c[0]-n.x)*kk;n.vy+=(c[1]-n.y)*kk;n.vz+=(c[2]-n.z)*kk;});}
    f.initialize=function(n){ns=n;};return f;}
