  l.setAttribute('stroke',c);l.setAttribute('stroke-opacity',o);l.setAttribute('stroke-width',w);
  l.setAttribute('stroke-linecap','round');(g||svg).appendChild(l);}
function tendrils(x,y,cx,cy,deg,ty){const ux=x-cx,uy=y-cy,L=Math.hypot(ux,uy)||1,nx=ux/L,ny=uy/L;
  const m=Math.min(7,2+Math.round(Math.sqrt(deg)));
  for(let i=0;i<m;i++){const a=(i-(m-1)/2)*0.34;
    const dx=nx*Math.cos(a)-ny*Math.sin(a),dy=nx*Math.sin(a)+ny*Math.cos(a);
    const len=10+Math.min(deg,28)*0.7;
    seg(x,y,x+dx*len,y+dy*len,COL[ty]||'#789',.17,1.1);}}
function posOf(id){if(id===curCid)return{x:curCx,y:curCy};const p=curRing.find(r=>r.id===id);return p?{x:p.x,y:p.y}:null;}
function clearHL(){if(hlg){hlg.remove();hlg=null;}}
function highlight(id){clearHL();const me=posOf(id);if(!me)return;
  hlg=document.createElementNS('http://www.w3.org/2000/svg','g');svg.appendChild(hlg);
  const ty=ninfo(id).ty;
  if(id!==curCid)seg(me.x,me.y,curCx,curCy,COL[ty],.85,2.2,hlg);
  const nbset=new Set(id===ROOT?D.topics:(D.adj[id]||[]));
  curRing.forEach(p=>{if(p.id!==id&&nbset.has(p.id))seg(me.x,me.y,p.x,p.y,COL[ty],.6,1.7,hlg);});
  if(id===curCid)curRing.forEach(p=>seg(curCx,curCy,p.x,p.y,COL[ty],.5,1.7,hlg));}
function siblings(ring){for(let i=0;i<ring.length;i++){const s=new Set(D.adj[ring[i].id]||[]);
  for(let j=i+1;j<ring.length;j++)if(s.has(ring[j].id))seg(ring[i].x,ring[i].y,ring[j].x,ring[j].y,'#9fb2db',.13,1);}}
window.go=function(id){
  const top=stack[stack.length-1];
  if(id===top){if(stack.length>1)stack.pop();}
  else{const i=stack.indexOf(id);stack=i>=0?stack.slice(0,i+1):stack.concat([id]);}
  render();
};
function mkBadge(id,inf,x,y,size,center,fx,fy){
  const b=document.createElement('div');b.className='badge'+(center?' center':'');
  b.style.setProperty('--c',COL[inf.ty]||COL.unknown);
  b.style.width=b.style.height=size+'px';b.style.fontSize=(size*0.46)+'px';
  b.style.left=fx+'px';b.style.top=fy+'px';b.style.opacity=0;
  b.innerHTML='<span class="ic">'+(IC[inf.ty]||'•')+'</span><div class="blab">'+esc(trunc(inf.t,14))+'</div>';
  b.title=inf.t+' ｜ '+(TL[inf.ty]||'')+' ｜ '+inf.d+' 連結';
  b.onclick=e=>{e.stopPropagation();go(id);};
  b.onmouseenter=()=>highlight(id);b.onmouseleave=clearHL;
  stage.appendChild(b);
  requestAnimationFrame(()=>{b.style.left=x+'px';b.style.top=y+'px';b.style.opacity=1;});
}
function line(x1,y1,x2,y2,ty){const l=document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
  l.setAttribute('stroke',COL[ty]||'#789');l.setAttribute('stroke-opacity','.3');
  l.setAttribute('stroke-width','1.4');svg.appendChild(l);}
function elabel(x,y,t){const d=document.createElement('div');d.className='elabel';
  d.style.left=x+'px';d.style.top=y+'px';d.textContent=t;stage.appendChild(d);}
function crumbRender(){let h='';stack.forEach((id,i)=>{const t=id===ROOT?'KnowAI':trunc(ninfo(id).t,16);
  h+=(i?'<span class="sep">›</span>':'')+'<a onclick="go(\''+id+'\')">'+esc(t)+'</a>';});crumb.innerHTML=h;}
function panelRender(cid,all){const ci=ninfo(cid);
  phead.innerHTML='<span class="pic" style="--c:'+(COL[ci.ty]||COL.unknown)+'">'+(IC[ci.ty]||'•')+'</span>'+
    '<span class="ptitle">'+esc(ci.t)+'</span><span class="pmeta">'+(TL[ci.ty]||'')+' · '+all.length+' 連結</span>';
  const g={topic:[],concept:[],entity:[],source:[],unknown:[]};
  all.forEach(id=>{(g[ninfo(id).ty]||g.unknown).push(id);});
  let h='';['topic','concept','entity','source'].forEach(ty=>{const a=g[ty];if(!a||!a.length)return;
    h+='<div class="pgrp"><b style="color:'+COL[ty]+'">'+IC[ty]+' '+TL[ty]+' ('+a.length+')</b><div class="chips">';
    a.slice(0,50).forEach(id=>{h+='<span class="chip2" onclick="go(\''+id+'\')" title="'+esc(ninfo(id).t)+'">'+esc(trunc(ninfo(id).t,20))+'</span>';});
    if(a.length>50)h+='<span class="more">+'+(a.length-50)+' …</span>';h+='</div></div>';});
  pchips.innerHTML=h;}
function render(){
  const cid=stack[stack.length-1],ci=ninfo(cid),all=nb(cid);
  const K=Math.min(all.length,18),ids=all.slice(0,K);
  const W=stage.clientWidth,H=stage.clientHeight,cx=W/2,cy=H/2,R=Math.min(W,H)*0.36;
  drawGhost(lastLayout);                       // 上一層：淡色背景
  stage.querySelectorAll('.badge,.elabel').forEach(e=>e.remove());
  svg.setAttribute('width',W);svg.setAttribute('height',H);svg.innerHTML='';hlg=null;
  const maxd=Math.max(1,...ids.map(i=>ninfo(i).d));
  const ring=ids.map((id,k)=>{const ang=-Math.PI/2+k*2*Math.PI/K;
    return {id,ty:ninfo(id).ty,d:ninfo(id).d,x:cx+R*Math.cos(ang),y:cy+R*Math.sin(ang),
      size:30+30*Math.sqrt(ninfo(id).d/maxd)};});
  curCid=cid;curCx=cx;curCy=cy;curRing=ring;
  ring.forEach(p=>seg(cx,cy,p.x,p.y,COL[p.ty],.3,1.5));      // 中心→鏈
  ring.forEach(p=>tendrils(p.x,p.y,cx,cy,p.d,p.ty));         // 前景每點：連往其它結點的觸鬚
  siblings(ring);                                            // 鏈與鏈之間的交叉連結
  if(K<=14)ring.forEach(p=>elabel((cx+p.x)/2,(cy+p.y)/2,TL[p.ty]));
  ring.forEach(p=>mkBadge(p.id,ninfo(p.id),p.x,p.y,p.size,false,cx,cy));
  mkBadge(cid,ci,cx,cy,74,true,cx,cy);
  lastLayout=ring.map(p=>({id:p.id,ty:p.ty,x:p.x,y:p.y,size:p.size}))
    .concat([{id:cid,ty:ci.ty,x:cx,y:cy,size:74}]);
  crumbRender();panelRender(cid,all);
}
stage.onclick=()=>{if(stack.length>1){stack.pop();render();}};
const s=document.getElementById('search');
s.addEventListener('keydown',e=>{if(e.key!=='Enter')return;const q=s.value.trim().toLowerCase();if(!q)return;
  const hit=Object.keys(D.nodes).find(id=>D.nodes[id].t.toLowerCase().includes(q)||id.toLowerCase().includes(q));
  if(hit){stack=[ROOT,hit];render();}});
let _t;addEventListener('resize',()=>{clearTimeout(_t);_t=setTimeout(render,200);});
render();
</script>
</body></html>
